name = "reivo-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# KV namespace for budget state and loop detection
# Set your own KV namespace IDs here
[[kv_namespaces]]
binding = "BUDGET_KV"
id = ""
preview_id = ""

[[kv_namespaces]]
binding = "USERS_KV"
id = ""
preview_id = ""

# Secrets (set via `wrangler secret put`)
# TURSO_DATABASE_URL
# TURSO_AUTH_TOKEN
